# setr ars_skip_uptodate_print "0"

# --- Nearby PI panels ---
# Enable or disable the floating PI panels shown near other vehicles (Config.performanceNearbyPanels.enabled). Default: 1
# setr pt_nearby_panels_enabled "1"

# Maximum distance in meters at which nearby PI panels are rendered (Config.performanceNearbyPanels.maxDistanceMeters). Default: 30
# setr pt_nearby_panels_distance "30"

# Maximum number of nearby PI panels drawn at once (Config.performanceNearbyPanels.maxPanels). Default: 6
# setr pt_nearby_panels_max "6"

# --- Nitrous ---
# Base nitrous shot duration in milliseconds before strength scaling (Config.nitrous.baseDurationMs). Default: 4000
# setr pt_nitrous_base_duration_ms "4000"

# Number of nitrous shots restored when refill conditions are met (Config.nitrous.shotsPerRefill). Default: 3
# setr pt_nitrous_shots_per_refill "3"

# Cooldown in milliseconds applied after each nitrous shot (Config.nitrous.shotCooldownMs). Default: 40000
# setr pt_nitrous_shot_cooldown_ms "40000"

# --- Performance bars ---
# Top speed in MPH that fills the speed bar to 100% — tune this to match the fastest cars on your server (Config.performanceBarFillTargets.topSpeedMph). Default: 250
# setr pt_bar_target_top_speed_mph "250"

# Lateral grip in Gs that fills the grip bar to 100% (Config.performanceBarFillTargets.grip). Default: 3.5
# setr pt_bar_target_grip_g "3.5"

setr pt_engine_swaps "dominator,gauntlet3,comet,vagner,nero"
