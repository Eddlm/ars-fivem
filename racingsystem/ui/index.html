<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RacingSystem GTAO URL Prompt</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="overlay" class="overlay hidden" aria-hidden="true">
        <div class="panel" role="dialog" aria-modal="true" aria-labelledby="title">
            <h2 id="title">Import GTAO Race URL</h2>
            <p class="hint">Paste a GTA Online race URL or UGC ID.</p>
            <input
                id="urlInput"
                type="text"
                autocomplete="off"
                placeholder="https://socialclub.rockstargames.com/job/gtav/..."
            />
            <div class="actions">
                <button id="submitBtn" type="button">Import</button>
                <button id="cancelBtn" type="button" class="ghost">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
