# setr ars_skip_uptodate_print "0"

# --- Race rules ---
# Maximum laps a host can set for a race (Config.maxLapCount). Default: 10
# setr rs_max_lap_count "10"

# Whether a player can host more than one race at the same time (Config.playerCanInvokeMultipleRaces). Default: 0
# setr rs_player_multiple_races "0"

# Whether the race owner can destroy their own race without admin privileges (Config.raceOwnerCanKillOwnedRace). Default: 0
# setr rs_owner_can_kill_race "0"

# How many seconds the countdown lasts before a race starts (Config.countdownMs / 1000). Default: 5
# setr rs_countdown_seconds "5"

# How far along the leader can be (percent) before late joins are blocked (Config.lateJoinProgressLimitPercent). Default: 50
# setr rs_late_join_limit_percent "50"

# --- Checkpoint penalties ---
# Meters outside the checkpoint radius above which a teleport correction is applied. Default: 10
# setr rs_penalty_teleport_threshold "10"

# Maximum throttle cut duration in milliseconds for a wide checkpoint miss. Default: 5000
# setr rs_penalty_throttle_max_ms "5000"

# --- Visibility ---
# Distance in meters at which checkpoint markers are drawn for clients (Config.checkpointDrawDistanceMeters). Default: 250
# setr rs_checkpoint_draw_distance "250"
