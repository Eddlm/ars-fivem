# Baseline traffic density when there are no active keyed requests.
# Must be numeric if you want automatic control while idle.
# If omitted or non-numeric, traffic_control stays idle until a valid request arrives.
# setr tControlDefault "1.0"

# Optional request logging toggle.
# Allowed values: "true" or "false".
# When set to "true", traffic_control prints request set/clear/reject events to server console
# for both server exports and client-local request traces.
# setr tControlPrintRequests "false"
