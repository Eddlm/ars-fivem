# Startup traffic density multiplier applied before any script request overrides it (0.0 = none, 1.0 = normal, 2.0 = full).
# setr tControlDefault "1.0"

# --- Default profile ---
# Traffic profile active at startup when no script requests are pending (Config.defaultMode). Options: none, low, normal, high, full
# setr tc_default_mode "normal"

# --- Normal profile density ---
# Vehicle density multiplier for the normal traffic profile (Config.profiles.normal.vehicleDensity). Default: 1.0
# setr tc_normal_vehicle_density "1.0"

# Pedestrian density multiplier for the normal traffic profile (Config.profiles.normal.pedDensity). Default: 1.0
# setr tc_normal_ped_density "1.0"

# --- Race mode density (used by racingsystem during active races) ---
# Vehicle density applied when racingsystem requests the low traffic mode. Default: 0.35 via legacyModeDensity
# setr tc_race_traffic_density "0.35"
