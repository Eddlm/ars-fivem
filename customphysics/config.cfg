# setr ars_skip_uptodate_print "0"

# --- Feature toggles ---
# Enable or disable the custom wheelie system entirely (Config.customWheelieEnabled). Default: 1
setr cp_wheelies_enabled true

# Restrict wheelies to muscle-class vehicles only (Config.wheeliesMuscleOnly). Default: 1
setr cp_wheelies_muscle_only true

# Enable or disable the rollover recovery system (Config.rolloversEnabled). Default: 1
# setr cp_rollovers_enabled "1"

# Enable or disable the offroad speed boost multiplier (Config.offroadBoostEnabled). Default: 1
# setr cp_offroad_boost_enabled "1"

# --- Offroad ---
# Maximum acceleration multiplier applied when off-road (Config.offroadMaxMultiplier). Default: 5.0
# setr cp_offroad_max_multiplier "5.0"

# --- Powerslides ---
# Speed in m/s a vehicle must reach before powerslide multiplier logic activates (Config.slideSpeedThresholdMetersPerSecond). Default: 3.0
# setr cp_slide_speed_threshold "3.0"

# Maximum power multiplier the powerslide system can apply (Config.slideMaxMultiplier). Default: 5.0
# setr cp_slide_max_multiplier "5.0"

# --- Fallback rev limiter ---
# Whether customphysics enforces a rev limiter when performancetuning state is absent (Config.fallbackRevLimiterEnabled). Default: 0
# setr cp_fallback_rev_limiter "0"
