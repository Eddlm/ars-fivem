name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          STAGING="/tmp/staging"
          mkdir -p "$STAGING"

          for module in racingsystem performancetuning vehiclemanager customphysics customcam traffic_control proper-handling; do
            if [ -d "$module" ]; then
              MODULE_STAGING="$STAGING/$module"
              mkdir -p "$MODULE_STAGING"

              rsync -a \
                --exclude='.git/' \
                --exclude='.gitignore' \
                --exclude='.gitattributes' \
                --exclude='.luarc.json' \
                --exclude='.claude/' \
                --exclude='CLAUDE.md' \
                --exclude='**/AGENTS.md' \
                --exclude='Docs/' \
                --exclude='calltrees/' \
                --exclude='tools/' \
                --exclude='race_index.json' \
                --exclude='savedvehicles/*.json' \
                "$module/" "$MODULE_STAGING/"

              if [ "$module" = "racingsystem" ]; then
                mkdir -p "$MODULE_STAGING/CustomRaces"
                mkdir -p "$MODULE_STAGING/OnlineRaces"
              fi
              if [ "$module" = "vehiclemanager" ]; then
                mkdir -p "$MODULE_STAGING/savedvehicles"
              fi
            fi
          done

          cd "$STAGING"
          zip -r "$GITHUB_WORKSPACE/ars-fivem.zip" .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "ars-fivem $GITHUB_REF_NAME" \
            --generate-notes \
            ars-fivem.zip
