# setr ars_skip_uptodate_print "0"

# --- Camera toggle ---
# How long in milliseconds the player must hold the camera key before the mode switches (Config.toggleHoldMs). Default: 1000
# setr cc_toggle_hold_ms "1000"

# Show on-screen hints for camera controls when first entering a vehicle (Config.showControlHints). Default: 1
# setr cc_show_control_hints "1"

# --- Virtual mirror ---
# Enable or disable the virtual rear mirror overlay (Config.VirtualMirror.enabled). Default: 1
# setr cc_virtual_mirror_enabled "1"

# Width of the virtual mirror as a fraction of screen width (Config.VirtualMirror.widthNormalized). Default: 0.315
# setr cc_virtual_mirror_width "0.315"

# Height of the virtual mirror as a fraction of screen height (Config.VirtualMirror.heightNormalized). Default: 0.08
# setr cc_virtual_mirror_height "0.08"

# --- Follow cam ---
# Starting distance in meters from the vehicle when the follow cam first spawns (Config.FollowCam.initialSpawnDistanceMeters). Default: 3.5
# setr cc_followcam_spawn_distance "3.5"
